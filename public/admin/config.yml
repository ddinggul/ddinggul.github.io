# Decap CMS Configuration
# Only accessible by the repository owner (ddinggul)

backend:
  name: github
  repo: ddinggul/ddinggul.github.io
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

# Only allow repository collaborators to login
publish_mode: editorial_workflow

# Media files (images, etc.)
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Collections - Content you can edit
collections:
  # Blog Posts Collection
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: true
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Description", name: "description", widget: "text", required: true }
      - { label: "Publish Date", name: "pubDate", widget: "datetime", required: true }
      - { label: "Tags", name: "tags", widget: "list", required: true, default: [] }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown", required: true }

  # About Page
  - name: "pages"
    label: "Pages"
    files:
      - label: "About Page"
        name: "about"
        file: "src/pages/about.astro"
        fields:
          - { label: "Content", name: "body", widget: "markdown" }

      - label: "CV Page"
        name: "cv"
        file: "src/pages/cv.astro"
        fields:
          - { label: "Content", name: "body", widget: "markdown" }

      - label: "Contact Page"
        name: "contact"
        file: "src/pages/contact.astro"
        fields:
          - { label: "Content", name: "body", widget: "markdown" }

  # Projects (as data file)
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/data/projects"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Description", name: "description", widget: "text", required: true }
      - { label: "Stack", name: "stack", widget: "list", required: true }
      - { label: "Status", name: "status", widget: "select", options: ["Active", "In Progress", "In Development", "Experimental"], required: true }
      - { label: "Category", name: "category", widget: "select", options: ["Research", "Application"], required: true }
      - { label: "GitHub URL", name: "github", widget: "string", required: false }
      - { label: "Demo URL", name: "demo", widget: "string", required: false }

  # Site Settings
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Site Information"
        name: "site"
        file: "src/data/site.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Author Name", name: "author", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "GitHub Username", name: "github", widget: "string" }
          - { label: "Instagram Handle", name: "instagram", widget: "string" }
